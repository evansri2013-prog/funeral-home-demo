<title>The Richard Evans Business Growth System – Landing</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #000;
        color: #fff;
        overflow-x: hidden;
    }

    /* Fade-in animation */
    .fade-in {
        opacity: 0;
        transform: translateY(20px);
        transition: opacity 1s ease-out, transform 1s ease-out;
    }
    .fade-in.visible {
        opacity: 1;
        transform: translateY(0);
    }

    /* Slide-in left */
    .slide-left {
        opacity: 0;
        transform: translateX(-40px);
        transition: opacity 1s ease-out, transform 1s ease-out;
    }
    .slide-left.visible {
        opacity: 1;
        transform: translateX(0);
    }

    /* Slide-in right */
    .slide-right {
        opacity: 0;
        transform: translateX(40px);
        transition: opacity 1s ease-out, transform 1s ease-out;
    }
    .slide-right.visible {
        opacity: 1;
        transform: translateX(0);
    }
